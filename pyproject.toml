    "mypy>=1.20.0",
    "pytest>=9.0.2",
    "pytest-asyncio>=0.25",
    "ruff>=0.15.8",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
